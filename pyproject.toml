[project]
name = "openhouse"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0", "httpx>=0.27"]

[project.scripts]
openhouse = "openhouse.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
