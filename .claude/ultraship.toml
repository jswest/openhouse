# ultraship config — openhouse's repo-specific values for the vendored
# `/ultraship` skill. The pressed SKILL.md/ultraship.py read from here and
# hard-code nothing; edit this file, not the skill. (No `.example` ships with the
# skill — see `.claude/skills/ultraship/SPEC.md` in the drawer for key docs.)

base_branch      = "main"                          # default branch / promotion target
branch_prefix    = "omnibus"                       # omnibus branch stem (shared with ship)
version_scheme   = "leading-v"                      # omnibus issues are titled `vX.Y.Z — …`,
                                                   #   so prefer `omnibus/vX.Y.Z`
worktree_pattern = "../{repo}-issue-{n}-{slug}"    # sibling, never nested

test_cmd         = "uv run pytest"                 # the suite
gate_agent       = "simplify-refactor"             # quality agent over each sub-PR diff
ship_skill       = "ship"                          # per-issue skill (informational / promotion parity)

decisions_dir    = "docs/decisions"                # one additive note per decision
decisions_index  = "docs/decisions/README.md"      # newest-first index

guard_hook       = ".claude/hooks/guard-main-write.sh"  # detected; informational only
docs_only_globs  = ["*.md", "LICENSE*", "docs/**"]      # auto-skip the suite when the diff is wholly docs
skip_tests_token = true                                 # honor a `skip-tests` opt-in

# Injected verbatim into every player's instructions — openhouse's live-data
# redline (analog of ship's live_data_note).
player_guardrails = "Stay offline. Verify only against tests/fixtures/. Never probe or fetch the Clerk's site unattended; the suite runs on checked-in fixtures."
